# vishkrm tmux config — ported from Mac dotfiles 2026-05-18 (Phase 4)
# Source: ~/synnas_home/cov-spawn/dotfiles/.tmux.conf
# Scrubs:
#   - server:covecta-channel → flag stripped (wrapper at ~/.local/bin/claude adds CLAUDE_CHANNELS)
#   - /Users/spawn path-abbreviation → $HOME
#   - Added @resurrect-dir for NAS-anchored persistence

set-option -g default-terminal "screen-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'
set-option -sa terminal-overrides ',screen-256color:RGB'
set-option -sa terminal-overrides ',tmux-256color:RGB'
set-option -g status on
set-option -g status-interval 2
set-option -g status-justify "centre"
set-option -g status-left-length 60
set-option -g status-right-length 90

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
# claude restore — wrapper at ~/.local/bin/claude adds channel flag via CLAUDE_CHANNELS
set -g @resurrect-processes '"~claude->claude --continue"'
# NAS-anchored persistence — survives container rebuilds, follows you across machines
set -g @resurrect-dir '$HOME/synnas_home/babaji/projects/.vishkrm/tmux-resurrect'

# tmux-continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Fix escape time delay (important for vim/neovim)
set -sg escape-time 0

# new-session -n $HOST  # Commented out - only needed on tmux startup, not reload
# Set the prefix to ^J.
unbind C-b
set -g prefix ^J
bind a send-prefix
# set scrollback history
    set -g history-limit 1000000
# reload ~/.tmux.conf using PREFIX r (both R and r work)
    bind R source-file ~/.tmux.conf \; display "Reloaded!"
    bind r source-file ~/.tmux.conf \; display "Reloaded!"

#set -g mouse on
set-option -g mouse on

# Bind appropriate commands similar to screen.
# lockscreen ^X x
unbind ^X
unbind M-r
bind ^X lock-server
unbind x
bind x lock-server

# screen ^C c
unbind ^C
bind ^C new-window
unbind c
bind c new-window -c "#{pane_current_path}"

# detach ^D d
unbind ^D
bind ^D detach

# displays *
unbind *
bind * list-clients

# next ^@ ^N sp n
unbind ^@
bind ^@ next-window
unbind ^N
bind ^N next-window
unbind " "
bind " " next-window
unbind n
bind n next-window

# title A
unbind A
bind A command-prompt "rename-window %%"

# other ^A
unbind ^A
bind ^A last-window

# prev ^H ^P p ^?
unbind ^H
bind ^H previous-window
unbind ^P
bind ^P previous-window
unbind p
bind p previous-window
unbind BSpace
bind BSpace previous-window

# windows ^W w
unbind ^W
bind ^W list-windows
unbind w
bind w list-windows

# quit \
bind q confirm-before "kill-server"

# kill K k
unbind K
bind K confirm-before "kill-window"
unbind k
bind k confirm-before "kill-window"

# redisplay ^L l
unbind ^L
bind ^L refresh-client
unbind l
bind l refresh-client

# send command to all panes
bind C-a setw synchronize-panes

# use PREFIX | to split window horizontally and PREFIX - to split vertically
    bind | split-window -h -c "#{pane_current_path}"
    bind - split-window -v -c "#{pane_current_path}"

# " windowlist -b
unbind '"'
bind '"' choose-window

# Vi mode keys
 set-window-option -g mode-keys vi
 bind h select-pane -L
 bind j select-pane -D
 bind k select-pane -U
 bind l select-pane -R

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set -g @shell_mode 'vi'
run '~/.tmux/plugins/tpm/tpm'

# Additional useful plugins for system monitoring
set -g @plugin 'tmux-plugins/tmux-cpu'          # CPU, RAM, load monitoring
set -g @plugin 'tmux-plugins/tmux-battery'      # Battery status
set -g @plugin 'tmux-plugins/tmux-net-speed'    # Network speed monitor
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'  # Show when prefix is active
set -g @plugin 'tmux-plugins/tmux-online-status'     # Online/offline indicator
set -g @plugin 'tmux-plugins/tmux-open'         # Open highlighted files/URLs

# CPU plugin config
set -g @cpu_low_thresh 30
set -g @cpu_medium_thresh 70
set -g @cpu_high_thresh 90

# Battery plugin config
set -g @batt_icon_charge_tier8 '🔋'
set -g @batt_icon_charge_tier7 '🔋'
set -g @batt_icon_charge_tier6 '🔋'
set -g @batt_icon_charge_tier5 '🔋'
set -g @batt_icon_charge_tier4 '🔋'
set -g @batt_icon_charge_tier3 '🪫'
set -g @batt_icon_charge_tier2 '🪫'
set -g @batt_icon_charge_tier1 '🪫'
set -g @batt_icon_status_charging '⚡'

# Ultimate information-rich status bar configuration

# Status bar styling - 2 lines: top=tabs, bottom=info
set -g status 2
set -g status-interval 2
set -g status-justify centre
set -g status-style bg=colour235,fg=colour250
set -g status-format[0] "#[align=left]#{E:status-left}#[align=right]#{E:status-right}"
set -g status-format[1] "#[align=centre,bg=colour235]#{W:#{?window_active,#{E:window-status-current-format},#{E:window-status-format}}}"

# Left status - session/window info + system metrics + session count
set -g status-left-length 120
set -g status-left "#[fg=colour16,bg=colour2,bold] ❐ #S #[fg=colour2,bg=colour235]#[fg=colour250] ⧉ #I:#P #[fg=colour240]│ #[fg=colour178]⚡#{cpu_percentage} #[fg=colour240]│ #[fg=colour109]⏱ #(uptime | awk -F'load average:' '{print $2}' | awk '{print $1,$2,$3}') #[fg=colour240]│ #[fg=colour117]⧉ #(tmux list-sessions 2>/dev/null | wc -l | tr -d ' ') sessions "

# Right status - system info + weather + timezones + time
set -g status-right-length 200
set -g status-right "#[fg=colour226]#(~/.local/bin/tmux-slack-status) #[fg=colour240]│ #[fg=colour39]↓#{download_speed} #[fg=colour82]↑#{upload_speed} #[fg=colour240]│ #[fg=colour203]#{ram_percentage} RAM #[fg=colour240]│ #[fg=colour222]#{battery_icon}#{battery_percentage} #[fg=colour240]│ #[fg=colour147]#{online_status} #[fg=colour240]│ #[fg=colour229]#(curl -s 'wttr.in/?format=%%c+%%t' 2>/dev/null || echo '☁') #[fg=colour240]│ #[fg=colour81]🌍 UTC #(TZ='UTC' date '+%%H:%%M') #[fg=colour140]IST #(TZ='Asia/Kolkata' date '+%%H:%%M') #[fg=colour183]PST #(TZ='America/Los_Angeles' date '+%%H:%%M') #[fg=colour240]│ #[fg=colour245,bg=colour235] %a %b %d #[fg=colour16,bg=colour245,bold] %H:%M:%S "

# Window status
set -g window-status-format "#[fg=colour244,bg=colour235] #I #[fg=colour250]#W#{?window_activity_flag,!,}#{?window_bell_flag,🔔,}#{?window_zoomed_flag,🔍,} "
set -g window-status-current-format "#[fg=colour235,bg=colour39]#[fg=colour16,bg=colour39,bold] #I #W#{?window_zoomed_flag,🔍,} #[fg=colour39,bg=colour235]"

# Fix window tab clicking
bind-key -T root MouseDown1Status select-window -t =

# Single click to select pane
bind-key -T root MouseDown1Pane select-pane -t = \; send-keys -M

# Activity monitoring
set -g monitor-activity on
set -g visual-activity off

# Claude session directory tracking (user@host, full path with ~, git branch, git status)
set -g pane-border-status bottom
set -g pane-border-format "#{?pane_active,#[fg=white bg=red bold blink]▓▓▓▓▓▓▓ ▶▶▶ #[fg=brightyellow bg=red]#(whoami)@#H #[fg=colour240 bg=red]│ #[fg=brightcyan bg=red]#{pane_index} #[fg=brightwhite bg=red]#(echo '#{pane_current_path}' | sed \"s|^$HOME|~|\") #[fg=brightmagenta bg=red]#(cd #{pane_current_path} 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '') #[fg=brightyellow bg=red]#(cd #{pane_current_path} 2>/dev/null && git diff --quiet 2>/dev/null || echo '✗') #[fg=white bg=red bold blink] ◀◀◀▓▓▓▓▓▓▓,#[fg=colour250 bg=colour235]┃┃┃┃┃┃┃   #[fg=green bg=colour235]#(whoami)@#H #[fg=colour240 bg=colour235]│ #[fg=brightblue bg=colour235]#{pane_index} #[fg=cyan bg=colour235]#(echo '#{pane_current_path}' | sed \"s|^$HOME|~|\") #[fg=magenta bg=colour235]#(cd #{pane_current_path} 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '') #[fg=yellow bg=colour235]#(cd #{pane_current_path} 2>/dev/null && git diff --quiet 2>/dev/null || echo '✗') #[fg=colour250 bg=colour235] ┃┃┃┃┃┃┃}"

# VERY VISIBLE pane borders
set -g pane-border-lines double
set -g pane-border-style fg=colour240,bg=default
set -g pane-active-border-style fg=brightred,bg=default,bold,blink

# Pane navigation (original bindings restored)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Swap mode: Prefix + s + hjkl
bind s switch-client -T swap-table
bind -T swap-table h select-pane -L \; swap-pane -s !
bind -T swap-table j swap-pane -D
bind -T swap-table k swap-pane -U
bind -T swap-table l select-pane -R \; swap-pane -s !

# Move/break-and-join mode: Prefix + m + hjkl
bind m switch-client -T move-table
bind -T move-table h run-shell 'tmux select-pane -m && tmux select-pane -L && tmux join-pane -h'
bind -T move-table j run-shell 'tmux select-pane -m && tmux select-pane -D && tmux join-pane -v -b'
bind -T move-table k run-shell 'tmux select-pane -m && tmux select-pane -U && tmux join-pane -v'
bind -T move-table l run-shell 'tmux select-pane -m && tmux select-pane -R && tmux join-pane -h -b'

# Help popup - Prefix + ? (only fires if ~/.tmux-help.sh exists; harmless otherwise)
bind ? if-shell '[ -x ~/.tmux-help.sh ]' 'display-popup -E -w 80% -h 80% "~/.tmux-help.sh #{pane_id}"' 'display "No help script — install ~/.tmux-help.sh to enable"'

# Mark pane
bind M select-pane -m

# Quick Layout Switching - Prefix + Alt-[1-5]
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# Extended keys — enables Shift+Enter and other modified keys (required for Claude's chat newline)
set -g extended-keys on
set -ga terminal-features 'xterm-256color:extkeys'
